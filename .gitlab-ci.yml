# Local Shell Runner Configuration
# This workflow uses the local environment of the machine (no Docker image needed)
# All comments are in English as requested.

variables:
  # Using local paths from your system (matching your Android Studio setup)
  ANDROID_HOME: "/home/crowstar/Android/Sdk"
  ANDROID_NDK_HOME: "/home/crowstar/Android/Sdk/ndk"

stages:
  - build
  - release

# Standard Gradle cache remains useful
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .gradle/caches
    - .gradle/wrapper

build_apk:
  stage: build
  script:
    # 0. Setup Environment (Inheriting from your local shell, but being explicit)
    - export PATH="$PATH:$HOME/.cargo/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/cmdline-tools/latest/bin"
    - rustup default stable || true
    # 1. Build Rust engine and generate UniFFI bindings using local cargo-ndk
    - cd rusteer
    # Ensure Android NDK home is exported as in your memory
    - export ANDROID_NDK_HOME="/home/crowstar/Android/Sdk/ndk"
    - cargo ndk -t arm64-v8a -t armeabi-v7a -t x86 -t x86_64 build --release
    - cargo build --release
    - cargo run --package uniffi --features cli --bin uniffi-bindgen generate --library target/release/librusteer.so --language kotlin --out-dir out --no-format
    
    # 2. Deploy libraries and bindings to the Android project
    - cd ..
    - mkdir -p app/src/main/jniLibs/arm64-v8a app/src/main/jniLibs/armeabi-v7a app/src/main/jniLibs/x86 app/src/main/jniLibs/x86_64
    - cp rusteer/target/aarch64-linux-android/release/librusteer.so app/src/main/jniLibs/arm64-v8a/
    - cp rusteer/target/armv7-linux-androideabi/release/librusteer.so app/src/main/jniLibs/armeabi-v7a/
    - cp rusteer/target/i686-linux-android/release/librusteer.so app/src/main/jniLibs/x86/
    - cp rusteer/target/x86_64-linux-android/release/librusteer.so app/src/main/jniLibs/x86_64/
    - mkdir -p app/src/main/java/com/crowstar/deeztrackermobile/features/rusteer
    - cp rusteer/out/uniffi/rusteer/rusteer.kt app/src/main/java/com/crowstar/deeztrackermobile/features/rusteer/rusteer.kt

    # 3. Decode Keystore and build the APK using local gradlew
    - echo "$KEYSTORE_BASE64" | base64 -d > deeztracker.jks
    - chmod +x gradlew
    - ./gradlew assembleRelease
  artifacts:
    name: "deeztracker-mobile-$CI_COMMIT_TAG"
    paths:
      - app/build/outputs/apk/release/*.apk
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/

gitlab_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build_apk
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - echo "Starting release publication for $CI_COMMIT_TAG"
  release:
    name: "Release $CI_COMMIT_TAG"
    description: "Automatic build from local runner. Includes updated Rusteer engine."
    tag_name: "$CI_COMMIT_TAG"
    assets:
      links:
        - name: "Download APK (Release)"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/download?job=build_apk"
