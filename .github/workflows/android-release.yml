name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          # Install a specific NDK version via sdkmanager
          # Using version 26.x as it's a stable modern version
          sdkmanager --install "ndk;26.1.10909125"
          # Set the environment variable for subsequent steps
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Cache Cargo Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Gradle Packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Build Rusteer Engine and Bindings
      - name: Build Rust Native Libraries and Bindings
        run: |
          # 1. Install Rust targets
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android
          
          # 2. Install cargo-ndk
          cargo install cargo-ndk
          
          # 3. Build Rust project for all platforms
          cd rusteer
          cargo ndk -t arm64-v8a -t armeabi-v7a -t x86 -t x86_64 build --release
          
          # 4. Build host library for UniFFI bindgen
          cargo build --release
          
          # 5. Generate Kotlin bindings using UniFFI
          cargo run --features uniffi/cli --bin uniffi-bindgen generate --library target/release/librusteer.so --language kotlin --out-dir out --no-format
          
          # 6. Deploy artifacts to Android project directories
          cd ..
          mkdir -p app/src/main/jniLibs/arm64-v8a app/src/main/jniLibs/armeabi-v7a app/src/main/jniLibs/x86 app/src/main/jniLibs/x86_64
          cp rusteer/target/aarch64-linux-android/release/librusteer.so app/src/main/jniLibs/arm64-v8a/
          cp rusteer/target/armv7-linux-androideabi/release/librusteer.so app/src/main/jniLibs/armeabi-v7a/
          cp rusteer/target/i686-linux-android/release/librusteer.so app/src/main/jniLibs/x86/
          cp rusteer/target/x86_64-linux-android/release/librusteer.so app/src/main/jniLibs/x86_64/
          
          # Deploy generated Kotlin code
          mkdir -p app/src/main/java/com/crowstar/deeztrackermobile/features/rusteer
          cp rusteer/out/uniffi/rusteer/rusteer.kt app/src/main/java/com/crowstar/deeztrackermobile/features/rusteer/rusteer.kt

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" > keystore.b64
          base64 -d keystore.b64 > deeztracker.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
